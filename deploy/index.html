<!DOCTYPE html>
<html>
	
  <head>
	<title>dyn.link</title>
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0"/>
	<meta charset="UTF-8">
    <style>
		
	  body {
		background-color: #F7F7F7;
	  }
	  
      .button {
        padding: 12px 20px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 0px 0px;
        -webkit-transition-duration: 0.4s; /* Safari */
        transition-duration: 0.4s;
        cursor: pointer;
      }

      .button1 {
        background-color: white; 
        color: black; 
        border: 2px solid #4CAF50;
      }

      .button1:hover {
        background-color: #4CAF50;
        color: white;
      }

      input[type=text] {
        width: 100%;
        padding: 12px 20px;
        margin: 8px 0;
        box-sizing: border-box;
		border: 2px solid #ccc;
        outline: none;
      }

      input[type=text]:focus {
		border: 2px solid #555;
      }

      div#box {
        width: 80%;
        max-width: 640px;
        border-radius: 5px;
        padding: 20px;
        display: table;
      }

      p.topfill {
        padding-top: 5%;
      }
	  
	  .bottombar {
		bottom: 0;
		position: fixed;
		overflow: auto;
		width: 80%;
		left: 10%;
		right: -10%;
		/* background-color: #FFFFFF; */
		text-align: center;
	  }
	  
	</style>
  </head>
  
  <body>
	<center>
		<p class="topfill"></p>
		<div id="box">
		  <h1>dyn.link</h1>
		  <p>AWS powered, serverless URL shortening service.</p>
	  	  <form action="https://s5xafkrz0i.execute-api.ap-northeast-1.amazonaws.com/prod/createlink" method="POST">
		    <input type="text" id="createlink" name="createlink" placeholder="Enter URL ..."><br>
		    <input type="submit" class="button button1" value="Create link">
		  </form>
		  <p>2018-08-14: Currently in Beta. Project info can be found <a href="https://github.com/heiskama/dynlink" class="active">here</a>.</p>
		</div>
	</center>
	
	<!---
	<div class="bottombar">
		Project info can be found <a href="https://github.com/heiskama/dynlink" class="active">here</a>.
	</div>
	-->
  </body>
	
</html>
